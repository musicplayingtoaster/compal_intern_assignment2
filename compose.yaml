services:
  nginx-proxy:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    networks:
      - todo-app-network

  app-1:
    build: .
    container_name: todo-container1
    env_file:
      - path: ./client-init.env
        required: true
    environment:
      - UV_HTTP_TIMEOUT=60
    ports:
      - "8000:8000"
    networks:
      - todo-app-network
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-db:
        condition: service_healthy

  app-2:
    build: .
    container_name: todo-container2
    env_file:
      - path: ./client-init.env
        required: true
    environment:
      - UV_HTTP_TIMEOUT=60
    ports:
      - "8080:8000"
    networks:
      - todo-app-network
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-db:
        condition: service_healthy
  
  postgres-db:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - path: ./pgdb-init.env
        required: true
    ports:
      - "5432:5432"
    networks:
      - todo-app-network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - type: bind
        source: ./init-db/
        target: /docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U db-user -d todo-list-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [
      "postgres",
      "-c", "log_statement=all",
      "-c", "log_connections=on",
      "-c", "log_disconnections=on",
      "-c", "log_duration=on",
    ]

networks:
  todo-app-network:
    driver: bridge

volumes:
  pgdata:
